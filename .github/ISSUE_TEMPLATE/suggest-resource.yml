name: Suggest a Resource
description: Suggest a collision detection library, paper, article, book, or related list
title: "[Suggestion] "
labels: ["suggestion"]
body:
  - type: input
    id: name
    attributes:
      label: Resource Name
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL
      description: Primary project, paper, article, or landing-page URL
    validations:
      required: true

  - type: input
    id: github
    attributes:
      label: GitHub Repository
      description: "GitHub `owner/repo` slug if available. Leave blank for non-GitHub resources."
      placeholder: owner/repo

  - type: input
    id: alt_repo
    attributes:
      label: Alternative Repository
      description: GitLab, Bitbucket, or other repository URL if the project is not on GitHub
      placeholder: https://gitlab.com/org/project

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: "Choose `New Category` only if none of the existing categories fit. Accepted suggestions in a new category require a manual maintainer PR."
      options:
        - Libraries
        - Mesh Processing
        - Papers
        - Books
        - Articles
        - Other Awesome Lists
        - New Category
    validations:
      required: true

  - type: input
    id: subsection
    attributes:
      label: Subsection
      description: For papers or articles, the subsection heading to use, for example `Continuous Collision Detection`

  - type: dropdown
    id: library_status
    attributes:
      label: Library Status
      description: For `Libraries` only
      options:
        - Not applicable
        - Active
        - Inactive

  - type: input
    id: shapes
    attributes:
      label: Shapes
      description: For active libraries only. Comma-separated.
      placeholder: Sphere, Box, Meshes

  - type: input
    id: features
    attributes:
      label: Features
      description: For active libraries only. Comma-separated.
      placeholder: Collision, Distance, Continuous Collision Detection

  - type: input
    id: languages
    attributes:
      label: Languages
      description: For libraries or mesh-processing tools. Comma-separated.
      placeholder: C++, Python

  - type: input
    id: license
    attributes:
      label: License
      description: SPDX identifier or short license text if known
      placeholder: BSD-3-Clause

  - type: textarea
    id: additional_links
    attributes:
      label: Additional Links
      description: "Optional. One per line as `label: https://...`, for example `pdf: https://...`"
      placeholder: |
        pdf: https://example.com/paper.pdf
        code: https://github.com/org/project

  - type: textarea
    id: description
    attributes:
      label: Description
      description: For libraries, a short summary. For papers, books, or articles, use this for citation, author, publisher, or other trailing text that should appear after the title.
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why should it be included?
      description: Explain why this is a strong fit for the list.

  - type: checkboxes
    id: must_have
    attributes:
      label: "Must-have checklist (all required)"
      options:
        - label: Relevant to collision detection, distance computation, proximity queries, or closely related geometry processing
        - label: Publicly accessible
        - label: Not a duplicate of an existing entry
        - label: Has a meaningful description

  - type: checkboxes
    id: scoring
    attributes:
      label: "Scoring checklist (need ≥ 3 of 5)"
      description: We will verify these during review. For non-GitHub resources, equivalent evidence is acceptable.
      options:
        - label: "**Popularity**: ≥ 50 GitHub stars (or equivalent community adoption)"
        - label: "**Activity**: At least one commit within the last 2 years"
        - label: "**Documentation**: Has a README, paper text, or usable documentation"
        - label: "**Maturity**: Project is ≥ 6 months old"
        - label: "**Uniqueness**: Fills a niche not already covered by existing entries"
