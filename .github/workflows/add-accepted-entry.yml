name: Add Accepted Entry

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to process
        required: true
        type: number

jobs:
  add-entry:
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'accepted') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install pyyaml jsonschema

      - name: Parse issue
        id: parse
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.eventName === 'workflow_dispatch'
              ? Number('${{ inputs.issue_number }}')
              : context.issue.number;

            const issueData = context.eventName === 'workflow_dispatch'
              ? (await github.rest.issues.get({
                  owner,
                  repo,
                  issue_number: issueNumber,
                })).data
              : context.payload.issue;

            const body = issueData.body || '';
            const labels = (issueData.labels || []).map(label => typeof label === 'string' ? label : label.name);
            if (!labels.includes('accepted')) {
              core.setFailed(`Issue #${issueNumber} does not have the accepted label`);
              return;
            }

            function extractField(name) {
              const re = new RegExp(`### ${name}\\s*\\n\\s*\\n?\\s*([\\s\\S]*?)(?=\\n###|$)`);
              const match = body.match(re);
              const value = match ? match[1].trim() : '';
              return value.toLowerCase() === '_no response_' ? '' : value;
            }

            function normalizeGitHubRepo(value) {
              if (!value) return '';
              const trimmed = value.trim();
              const slugMatch = trimmed.match(/^(?:https?:\/\/github\.com\/)?([a-zA-Z0-9._-]+\/[a-zA-Z0-9._-]+?)(?:\.git|\/)?$/);
              return slugMatch ? slugMatch[1] : '';
            }

            const payload = {
              issue_number: issueNumber,
              name: extractField('Resource Name'),
              url: extractField('URL'),
              github_repo: normalizeGitHubRepo(extractField('GitHub Repository')),
              alternative_repo: extractField('Alternative Repository'),
              category: extractField('Category'),
              subsection: extractField('Subsection'),
              library_status: extractField('Library Status'),
              shapes: extractField('Shapes'),
              features: extractField('Features'),
              languages: extractField('Languages'),
              license: extractField('License'),
              additional_links: extractField('Additional Links'),
              description: extractField('Description'),
            };

            const categoryMap = {
              'Libraries': 'libraries',
              'Mesh Processing': 'mesh-processing',
              'Papers': 'papers',
              'Books': 'books',
              'Articles': 'articles',
              'Other Awesome Lists': 'other-awesome-lists',
            };

            if (!payload.name || !payload.category) {
              core.setFailed('Could not parse required fields from issue body');
              return;
            }

            core.setOutput('name', payload.name);
            core.setOutput('issue_number', String(issueNumber));
            core.setOutput('category', payload.category);

            payload.yaml_file = categoryMap[payload.category] || '';
            core.setOutput('yaml_file', payload.yaml_file);
            core.setOutput('unsupported_category', payload.yaml_file ? 'false' : 'true');

            if (!payload.yaml_file) {
              return;
            }

            fs.writeFileSync('/tmp/add-entry-input.json', JSON.stringify(payload, null, 2));

      - name: Build entry and update YAML
        if: success() && steps.parse.outputs.unsupported_category != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/add_entry_from_payload.py /tmp/add-entry-input.json

      - name: Regenerate README
        if: success() && steps.parse.outputs.unsupported_category != 'true'
        run: python3 scripts/generate_readme.py

      - name: Validate
        if: success() && steps.parse.outputs.unsupported_category != 'true'
        run: python3 scripts/validate_entries.py

      - name: Create PR
        if: success() && steps.parse.outputs.unsupported_category != 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.parse.outputs.issue_number }}
          ENTRY_NAME: ${{ steps.parse.outputs.name }}
          YAML_FILE: ${{ steps.parse.outputs.yaml_file }}
        run: |
          SLUG="$(echo "${ENTRY_NAME}" | tr '[:upper:] ' '[:lower:]-' | tr -cd 'a-z0-9-' | cut -c1-48)"
          SLUG="${SLUG:-entry}"
          BRANCH="add-entry/${YAML_FILE}-${SLUG}-${ISSUE_NUMBER}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "data/${YAML_FILE}.yaml" README.md
          git commit --signoff -m "content: add ${ENTRY_NAME}

          Closes #${ISSUE_NUMBER}"
          git push -u origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "content: add ${ENTRY_NAME}" \
            --body "$(cat <<EOF
          ## Auto-generated from issue #${ISSUE_NUMBER}

          Adds **${ENTRY_NAME}** to \`data/${YAML_FILE}.yaml\`.

          - entry added from accepted issue
          - README.md regenerated
          - schema validation passed

          Closes #${ISSUE_NUMBER}
          EOF
          )")

          echo "url=${PR_URL}" >> "$GITHUB_OUTPUT"

      - name: Comment on issue for unsupported category
        if: steps.parse.outputs.unsupported_category == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = Number('${{ steps.parse.outputs.issue_number }}');
            const category = '${{ steps.parse.outputs.category }}';

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: [
                'This issue was accepted, but no PR was generated automatically.',
                '',
                `The selected category, "${category}", is not mapped to an existing data file yet.`,
                'Accepted suggestions in new categories need a manual maintainer PR to add the category structure before the entry itself can be added.',
                '',
                'The `needs-review` label has been applied so this does not get lost.',
              ].join('\n'),
            });

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: ['needs-review'],
            });

      - name: Comment on issue
        if: success() && steps.parse.outputs.unsupported_category != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.parse.outputs.issue_number }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "Opened auto-generated PR: $PR_URL"
