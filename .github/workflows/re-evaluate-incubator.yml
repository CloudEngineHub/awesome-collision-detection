name: Re-evaluate Incubator

on:
  schedule:
    - cron: "0 9 1 * *"
  workflow_dispatch: {}

jobs:
  re-evaluate:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - name: Find and re-evaluate incubator issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: actions/github-script@v8
        with:
          script: |
            const { execSync } = require('child_process');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            function normalizeGitHubRepo(value) {
              if (!value) return '';
              const trimmed = value.trim();
              const slugMatch = trimmed.match(/^(?:https?:\/\/github\.com\/)?([a-zA-Z0-9._-]+\/[a-zA-Z0-9._-]+?)(?:\.git|\/)?$/);
              return slugMatch ? slugMatch[1] : '';
            }

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              labels: 'incubator',
              state: 'open',
              per_page: 100,
            });

            if (issues.length === 0) {
              console.log('No incubator issues to re-evaluate.');
              return;
            }

            for (const issue of issues) {
              if (issue.pull_request) {
                console.log(`#${issue.number}: pull request, skipping`);
                continue;
              }

              const body = issue.body || '';
              let ghRepo = '';
              const ghFieldMatch = body.match(/### GitHub Repository\s*\n\s*\n?\s*([\s\S]*?)(?=\n###|$)/);
              ghRepo = normalizeGitHubRepo(ghFieldMatch ? ghFieldMatch[1] : '');
              if (!ghRepo) {
                const urlMatch = body.match(/github\.com\/([a-zA-Z0-9._-]+\/[a-zA-Z0-9._-]+)/);
                if (urlMatch) ghRepo = urlMatch[1];
              }
              if (!ghRepo) {
                console.log(`#${issue.number}: no repo found, skipping`);
                continue;
              }

              let result;
              try {
                const output = execSync(
                  `python3 scripts/evaluate_entry.py --data-dir data/ --json "${ghRepo}" || true`,
                  { env: { ...process.env }, timeout: 30000 }
                ).toString();
                result = JSON.parse(output);
              } catch (e) {
                console.log(`#${issue.number}: evaluation failed`);
                continue;
              }

              const rec = result.recommendation;
              if (rec === 'accept') {
                let report;
                try {
                  report = execSync(
                    `python3 scripts/evaluate_entry.py --data-dir data/ "${ghRepo}"`,
                    { env: { ...process.env }, timeout: 30000 }
                  ).toString();
                } catch (e) {
                  report = `Re-evaluation suggests this project now qualifies (score: ${result.auto_score}/${result.auto_total}).`;
                }

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: [
                    'Monthly re-evaluation update',
                    '',
                    'This project now appears to meet the inclusion criteria.',
                    '',
                    report,
                    '',
                    'The `accepted` label will be applied and an auto-generated PR will be queued.',
                  ].join('\n'),
                });

                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issue.number,
                  name: 'incubator',
                }).catch(() => {});
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issue.number,
                  labels: ['accepted'],
                });
                await github.rest.actions.createWorkflowDispatch({
                  owner,
                  repo,
                  workflow_id: 'add-accepted-entry.yml',
                  ref: context.payload.repository.default_branch,
                  inputs: {
                    issue_number: String(issue.number),
                  },
                });
              } else if (rec === 'likely_accept') {
                let report;
                try {
                  report = execSync(
                    `python3 scripts/evaluate_entry.py --data-dir data/ "${ghRepo}" || true`,
                    { env: { ...process.env }, timeout: 30000 }
                  ).toString();
                } catch (e) {
                  report = `Re-evaluation suggests this project may qualify with maintainer review (score: ${result.auto_score}/${result.auto_total}).`;
                }

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: [
                    'Monthly re-evaluation update',
                    '',
                    'This project may now meet the inclusion criteria, but it still needs maintainer review before acceptance.',
                    '',
                    report,
                    '',
                    'The `needs-review` label will be applied and no auto-generated PR will be queued.',
                  ].join('\n'),
                });

                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issue.number,
                  name: 'incubator',
                }).catch(() => {});
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issue.number,
                  labels: ['needs-review'],
                });
              } else if (rec === 'duplicate') {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: [
                    'Monthly re-evaluation update',
                    '',
                    `This project appears to have been added already (found as "${result.duplicate_of}" in ${result.duplicate_section}).`,
                    '',
                    'Closing this issue.',
                  ].join('\n'),
                });
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'completed',
                });
              }
            }
