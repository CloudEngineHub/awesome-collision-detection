name: Evaluate Submission

on:
  issues:
    types: [labeled]

jobs:
  evaluate:
    if: github.event.label.name == 'suggestion'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - name: Extract GitHub repo from issue body
        id: extract
        uses: actions/github-script@v9
        with:
          script: |
            const body = context.payload.issue.body || '';

            function normalizeGitHubRepo(value) {
              if (!value) return '';
              const trimmed = value.trim();
              const slugMatch = trimmed.match(/^(?:https?:\/\/github\.com\/)?([a-zA-Z0-9._-]+\/[a-zA-Z0-9._-]+?)(?:\.git|\/)?$/);
              return slugMatch ? slugMatch[1] : '';
            }

            const ghFieldMatch = body.match(/### GitHub Repository\s*\n\s*\n?\s*([\s\S]*?)(?=\n###|$)/);
            const ghRepo = normalizeGitHubRepo(ghFieldMatch ? ghFieldMatch[1] : '');
            if (ghRepo) {
              core.setOutput('repo', ghRepo);
              return;
            }

            const urlMatch = body.match(/github\.com\/([a-zA-Z0-9._-]+\/[a-zA-Z0-9._-]+)/);
            if (urlMatch) {
              core.setOutput('repo', urlMatch[1]);
              return;
            }

            core.setOutput('repo', '');

      - name: Run evaluation
        if: steps.extract.outputs.repo != ''
        id: eval
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT=$(python3 scripts/evaluate_entry.py --data-dir data/ "${{ steps.extract.outputs.repo }}" 2>&1) || true
          echo "$REPORT" > /tmp/eval-report.md

          python3 scripts/evaluate_entry.py --data-dir data/ --json "${{ steps.extract.outputs.repo }}" 2>/dev/null > /tmp/eval-result.json || true
          REC=$(python3 -c "import json; print(json.load(open('/tmp/eval-result.json')).get('recommendation','error'))" 2>/dev/null || echo "error")
          echo "recommendation=$REC" >> "$GITHUB_OUTPUT"

      - name: Post evaluation comment
        if: steps.extract.outputs.repo != ''
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/eval-report.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: report,
            });

      - name: Apply label and handle outcome
        if: steps.extract.outputs.repo != ''
        uses: actions/github-script@v9
        with:
          script: |
            const rec = '${{ steps.eval.outputs.recommendation }}';
            const issue = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const labelMap = {
              accept: 'accepted',
              likely_accept: 'needs-review',
              incubator: 'incubator',
              reject: 'rejected',
              duplicate: 'duplicate',
              error: 'needs-review',
              needs_review: 'needs-review',
            };
            const label = labelMap[rec] || 'needs-review';

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issue,
              labels: [label],
            });

            if (label === 'accepted') {
              // Labels applied with the default GITHUB_TOKEN do not trigger
              // downstream workflows, so explicitly dispatch the add-entry job.
              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id: 'add-accepted-entry.yml',
                ref: context.payload.repository.default_branch,
                inputs: {
                  issue_number: String(issue),
                },
              });
            }

            if (rec === 'duplicate' || rec === 'reject') {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue,
                state: 'closed',
                state_reason: 'not_planned',
              });
            }

      - name: Post fallback comment (no repo found)
        if: steps.extract.outputs.repo == ''
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                'Thanks for the suggestion.',
                '',
                'I could not find a GitHub repository in this issue, so I could not run an automated evaluation.',
                'A maintainer will review it manually.',
              ].join('\n'),
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-review'],
            });
